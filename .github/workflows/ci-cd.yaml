# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
#
# AUTENTICAÇÃO: VM Azure com System Assigned Managed Identity
#   - Não requer App Registration, Service Principal nem secrets de longa duração
#   - A VM é registrada como self-hosted runner no repositório GitHub
#   - Os jobs de build e deploy rodam NA VM, que autentica via `az login --identity`
#   - A Managed Identity da VM precisa das seguintes roles (atribuídas pelo admin):
#       AcrPush      → no Azure Container Registry
#       Contributor  → no Resource Group do AKS
#       Azure Kubernetes Service Cluster User Role → no cluster AKS
#
# VARIABLES necessárias (Settings → Secrets and variables → Actions → Variables):
#   ACR_NAME          → Nome do ACR sem .azurecr.io (ex: acraksobs)
#   AKS_CLUSTER_NAME  → Nome do cluster AKS
#   AKS_RESOURCE_GROUP→ Resource Group do AKS
#
# SETUP DO RUNNER (executar uma vez na VM):
#   1. Portal Azure → VM → Identity → System assigned → Status: On → Save
#   2. GitHub → Repo → Settings → Actions → Runners → New self-hosted runner
#   3. Seguir as instruções exibidas para Linux (download + configure + run)
#   4. Instalar dependências na VM: az cli, docker, kubectl, git, nodejs 20
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD — Build, Push & Deploy

on:
  repository_dispatch:
  push: 
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:  # permite execução manual pelo GitHub UI

env:
  IMAGE_NAME: otel-demo-app
  K8S_NAMESPACE: observability-lab

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # Roda no self-hosted runner (VM com MI) — sem necessidade de secrets Azure
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Adicione testes reais aqui (Jest, Mocha, etc.)
      # - name: Run unit tests
      #   working-directory: app
      #   run: npm test

      - name: Lint Dockerfile
        run: |
          if command -v hadolint &> /dev/null; then
            hadolint app/Dockerfile
          else
            echo "hadolint não instalado, pulando lint do Dockerfile"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Docker Image & Push to ACR
  # Roda na VM (self-hosted). A Managed Identity autentica no ACR sem secrets.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: self-hosted
    needs: build-and-test
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Managed Identity: nenhum secret necessário.
      # A VM se autentica no Azure usando o metadata endpoint interno (169.254.169.254).
      - name: Azure Login (Managed Identity)
        run: az login --identity

      # ACR login via az cli — usa a Managed Identity autenticada acima
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      # Gera a tag: SHA curto do commit (ex: sha-a1b2c3d)
      - name: Generate image tag
        id: tag
        run: echo "value=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }} \
            -t ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Push Docker image
        run: |
          docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Image summary
        run: |
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | ${{ vars.ACR_NAME }}.azurecr.io |" >> $GITHUB_STEP_SUMMARY
          echo "| Image    | ${{ env.IMAGE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag      | ${{ steps.tag.outputs.value }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to AKS
  # Roda na VM (self-hosted). kubectl é configurado pela Managed Identity da VM.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production  # requer aprovação manual (configure em Settings → Environments)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Managed Identity: autentica no Azure sem nenhum secret
      - name: Azure Login (Managed Identity)
        run: az login --identity

      # Configura o kubeconfig na VM usando a identidade da VM como credencial
      - name: Configure kubectl (get AKS credentials)
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP }} \
            --name ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # Injeta a tag da imagem gerada no job anterior no manifest
      - name: Update image in deployment manifest
        run: |
          IMAGE_FULL="${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|<acr-name>.azurecr.io/otel-demo-app:latest|${IMAGE_FULL}|g" k8s/app-deployment.yaml
          echo "Deploying image: ${IMAGE_FULL}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/otel-collector-configmap.yaml
          kubectl apply -f k8s/otel-collector-deployment.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          # Nota: secret-dynatrace.yaml NÃO é aplicado aqui por conter dados sensíveis.
          # O secret já deve existir no cluster (criado manualmente uma única vez).

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/otel-demo-app \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Verify deployment
        run: |
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get service otel-demo-app -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/otel-demo-app \
            --namespace=${{ env.K8S_NAMESPACE }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/otel-demo-app \
            --namespace=${{ env.K8S_NAMESPACE }}
