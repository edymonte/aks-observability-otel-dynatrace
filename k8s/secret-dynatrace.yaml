# ─────────────────────────────────────────────────────────────────────────────
# SECRET — Dynatrace API Token
#
# IMPORTANTE: Nunca commitar valores reais neste arquivo!
# Em produção, use:
#   - Azure Key Vault + CSI Driver (recomendado no AKS)
#   - External Secrets Operator
#   - Sealed Secrets (Bitnami)
#
# Para criar o secret via CLI (seguro — nunca commitar tokens no repo!):
#   kubectl create secret generic dynatrace-secret \
#     --namespace=observability-lab \
#     --from-literal=DT_OTLP_ENDPOINT='https://<env-id>.live.dynatrace.com/api/v2/otlp' \
#     --from-literal=DT_API_TOKEN='Api-Token <seu-token>'
#
# Os valores abaixo são placeholders em base64.
# "placeholder" em base64 = cGxhY2Vob2xkZXI=
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: dynatrace-secret
  namespace: observability-lab
  labels:
    app.kubernetes.io/component: observability
type: Opaque
# stringData: Kubernetes faz o encoding base64 internamente.
# As chaves correspondem diretamente às variáveis de ambiente lidas pelo OTEL Collector.
stringData:
  DT_OTLP_ENDPOINT: "https://SEU-AMBIENTE.live.dynatrace.com/api/v2/otlp"
  DT_API_TOKEN: "Api-Token SEU_TOKEN_AQUI"
